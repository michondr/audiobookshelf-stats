services:
  abs-stats:
    build: .
    image: abs-stats:latest
    container_name: abs-stats
    restart: unless-stopped
    user: "${PUID:-1000}:${PGID:-1000}"
    environment:
      ABS_URL: ${ABS_URL}
      ABS_PUBLIC_URL: ${ABS_PUBLIC_URL:-}
      ABS_TOKEN: ${ABS_TOKEN}
      TZ: ${TZ:-Europe/Prague}
      PORT: ${PORT:-8080}
      DATA_DIR: ${DATA_DIR:-/data}
    volumes:
      - ./data:/data
